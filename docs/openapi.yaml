openapi: 3.0.3
info:
  title: Bookstore Management API
  version: 1.0.0
  description: API documentation for bookstore management
servers:
  - url: http://localhost:8080/api
    description: Local Development Server
  # - url: example.com
  #   description: Production Server
tags:
  - name: Monitoring
    description: API Monitoring endpoints
  - name: Reviews
    description: Operations related to reviews
  - name: Users
    description: Operations related to users
  - name: Authentication
    description: User authentication endpoints
  - name: Books
    description: Operations related to books
  - name: Authors
    description: Operations related to authors

paths:
  /authors/{id}/books:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      summary: Get Author's Books
      tags:
        - Authors
      responses:
        '200':
          description: Success Case
          content:
            application/json:
              schema:
                type: array
                $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/BadResourceId'
        '404':
          $ref: '#/components/responses/NotFound'
      deprecated: false
  /authors/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Authors
      summary: Update Author By Id
      description: Updates an author by id.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/Author'
      responses:
        '200':
          $ref: '#/components/responses/AuthorSuccessCase'
        '400':
          description: Bad Request due to invalid input or invalid ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - ID must be a positive integer
                    - Name must be at least 4 characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags:
        - Authors
      summary: Get Author By Id
      description: Get author by Id
      responses:
        '200':
          $ref: '#/components/responses/AuthorSuccessCase'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadResourceId'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Authors
      summary: Delete Author by Id
      responses:
        '204':
          description: Sucessfully deleted Author
        '400':
          $ref: '#/components/responses/BadResourceId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/compoents/responses/NotFound'
  /authors/:
    post:
      security:
        - bearerAuth: []
      tags:
        - Authors
      summary: Create Author
      responses:
        '201':
          $ref: '#/components/responses/AuthorSuccessCase'
        '400':
          $ref: '#/components/responses/BadAuthorData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/Author'
    get:
      tags:
        - Authors
      summary: Get All Authors
      description: Get all authors in the database.
      responses:
        '200':
          description: Success Case
          content:
            application/json:
              schema:
                type: array
                $ref: '#/components/schemas/Author'

  # -------------------- BEGIN /api/users/:id --------------------
  /users/{id}:
    delete:
      security:
        - bearerAuth: []
      summary: Delete User
      description: Deletes a user in the database by Id
      tags:
        - Users
      responses:
        '204':
          description: User deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

      deprecated: false
    patch:
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      tags:
        - Users
      summary: Update User Role
      description: Update a user's role in the database
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
              example:
                role: USER
      responses:
        '200':
          $ref: '#/components/responses/UserSuccessCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      summary: Get User By Id
      description: Gets a user in the database by Id
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/UserSuccessCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------- END /api/users/:id --------------------
  # -------------------- BEGIN /api/users/me --------------------
  /users/me:
    put:
      security:
        - bearerAuth: []
      tags:
        - Users
      requestBody:
        description: New User Details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'

      summary: Update Authenticated User
      description: Updates the authenticated user in the database
      responses:
        '200':
          $ref: '#/components/responses/UserSuccessCase'
        '400':
          $ref: '#/components/responses/BadUpdateInformation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/EmailConflict'
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Get Authenticated User
      description: Get the authenticated user's account
      responses:
        '200':
          $ref: '#/components/responses/UserSuccessCase'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------- END /api/users/me --------------------
  # -------------------- BEGIN /api/users/ --------------------
  /users/:
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Get All Users
      responses:
        '200':
          description: Success Case
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          $ref: '#/components/responses/Forbidden'
  # -------------------- END /api/users/ --------------------
  # -------------------- BEGIN /api/auth/login --------------------
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate User
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'
  # -------------------- END /api/auth/login --------------------
  # -------------------- BEGIN /api/auth/signup --------------------
  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Create an Account
      description: Creates a user and returns the information about them
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'
        '201':
          description: Account Creation Successful
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/EmailConflict'
  # -------------------- END /api/auth/signup --------------------
  # -------------------- BEGIN /api/health/ --------------------
  /health:
    get:
      summary: Health Check
      description: Returns the current status of the API. Used by Render to verify service is running.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  # -------------------- END /api/health/ --------------------
components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1
  # -------------------- BEGIN SCHEMA COMPONENTS --------------------
  schemas:
    Author:
      type: object
      properties:
        id:
          type: number
          example: 1
          readOnly: true
        name:
          type: string
          example: 'Alex Prechtel'
          readOnly: false
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@example.com'
        password: 'password123'
    Book:
      type: object
      properties:
        id:
          type: number
          example: 1
          readOnly: true
        name:
          type: string
          example: 'The Very Hungry Caterpillar'
        price:
          type: number
          example: 9.99
        published:
          type: string
          example: '2026-03-29T02:41:10.737Z'
        authorId:
          type: number
          example: 1
    User:
      type: object
      properties:
        id:
          type: number
          example: 1
          readOnly: true
        email:
          type: string
          readOnly: false
          example: user@example.com
        role:
          type: string
          readOnly: true
          example: USER
        createdAt:
          type: string
          readOnly: true
          example: '2026-03-29T02:41:10.737Z'
    Review:
      type: object
      properties:
        id:
          type: number
          example: 1
          readOnly: true
        content:
          type: string
          example: 'This was a really good book!'
          readOnly: false
        createdAt:
          type: string
          readOnly: true
          example: '2026-03-29T02:41:10.737Z'
        rating:
          type: number
          readOnly: false
          example: 5
        bookId:
          type: number
          readOnly: false
          example: 1
        userId:
          type: number
          readOnly: true
          example: 1
  # -------------------- END SCHEMA COMPONENTS --------------------
  responses:
    # -------------------- BEGIN RESPONSE COMPONENTS --------------------
    BadAuthorData:
      description: Bad Author data.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: Name must be at least 4+ characters
    AuthorSuccessCase:
      description: Success Case
      content:
        application/json:
          schema:
            type: object
            $ref: '#/components/schemas/Author'
    UserSuccessCase:
      description: Success Case
      content:
        application/json:
          schema:
            type: object
            $ref: '#/components/schemas/User'
    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: Resource 1 not found
    BadResourceId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - ID must be a postive integer
    BadUpdateInformation:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email or password is required'
                - 'Password must contain at least 8 characters and at most 64 characters'
                - 'Email must be vaild'
    InvalidUserInput:
      description: Bad Request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
    EmailConflict:
      description: Email is already in use
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: Email has already been used
    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'
    Forbidden:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Forbidden: insufficient permission'
  # -------------------- END RESPONSE COMPONENTS --------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
